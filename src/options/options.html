<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>猎职 设置</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="title">猎职<span class="dot">·</span>设置</h1>
      <p class="subtitle">配置 AI 接口和简历信息</p>
    </header>

    <section class="migration-banner" aria-label="设置入口迁移提示">
      <div class="migration-banner-badge">兼容入口</div>
      <h2 class="migration-banner-title">主设置入口已迁移到侧边面板头部的“完整设置”</h2>
      <p class="migration-banner-text">建议优先在 BOSS 直聘侧边面板中完成日常配置。本页继续保留保存、导入、导出能力，便于兼容旧使用习惯。</p>
    </section>

    <!-- 简历图片 -->
    <section class="card">
      <h2 class="card-title">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
        简历图片
      </h2>
      <p class="card-desc">上传 1-2 张简历截图，海投时自动跟发。支持 JPG/PNG/WebP。</p>
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" multiple hidden>
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 5v14M5 12h14"/></svg>
        <span>拖拽图片到此处，或<span class="link">点击上传</span></span>
      </div>
      <div class="preview-grid" id="previewGrid"></div>
    </section>

    <!-- AI API 配置 -->
    <section class="card" id="apiSection">
      <div class="card-header-collapsible" id="apiSectionToggle">
        <h2 class="card-title">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M16 12h-4V8"/></svg>
          AI API 配置
        </h2>
        <svg class="card-chevron" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M3 4.5l3 3 3-3"/>
        </svg>
      </div>
      <div class="card-body-collapsible" id="apiSectionBody">
        <div class="form-group">
          <label class="form-label" for="provider">Provider</label>
          <select id="provider" class="form-input"></select>
        </div>
        <div class="form-group hidden" id="baseUrlGroup">
          <label class="form-label" for="baseUrl">Base URL</label>
          <input type="url" id="baseUrl" class="form-input" placeholder="https://api.example.com/v1" autocomplete="off">
        </div>
        <div class="form-group">
          <label class="form-label" for="apiKey">API Key</label>
          <div class="secret-input-wrap">
            <input type="password" id="apiKey" class="form-input" placeholder="sk-xxxxxxxxxxxx" autocomplete="off">
            <button class="secret-toggle" id="apiKeyToggle" type="button" title="显示 API Key" aria-label="显示 API Key">
              <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3l18 18"/><path d="M10.6 10.6a3 3 0 0 0 4.2 4.2"/><path d="M9.9 4.2A10.8 10.8 0 0 1 12 4c6.5 0 10 8 10 8a18 18 0 0 1-3.1 4.2"/><path d="M6.6 6.6C3.6 8.6 2 12 2 12s3.5 8 10 8a10.8 10.8 0 0 0 4.1-.8"/></svg>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="model">Model</label>
          <div class="model-select-row">
            <select id="model" class="form-input"></select>
            <button type="button" id="refreshModelsBtn" class="btn-secondary model-refresh-btn">刷新模型</button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="scoreThreshold">AI 筛选阈值</label>
          <input type="number" id="scoreThreshold" class="form-input" min="0" max="100" step="1" placeholder="60">
        </div>
        <button type="button" id="testAiBtn" class="btn-save" style="width:100%;margin-bottom:12px">测试 AI 连接</button>
        <div class="form-group">
          <label class="form-label" for="textResume">文字简历</label>
          <p class="card-desc">招呼语生成时参考你的简历内容，越详细越好。</p>
          <textarea id="textResume" class="form-textarea" rows="6" placeholder="请在此粘贴你的简历文本..."></textarea>
        </div>
      </div>
    </section>

    <section class="card">
      <h2 class="card-title">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        完整资料备份
      </h2>
      <p class="card-desc">导出或导入筛选配置、简历图片、文字简历与 AI 设置。导入会先预览，再确认覆盖。</p>
      <div class="backup-actions">
        <button type="button" id="exportBtn" class="btn-secondary">导出配置</button>
        <button type="button" id="importBtn" class="btn-secondary">导入配置</button>
        <input type="file" id="importFileInput" accept="application/json,.json" hidden>
      </div>
      <div id="importStatus" class="import-status hidden"></div>
      <div id="importPreviewCard" class="import-preview hidden">
        <div class="import-preview-header">
          <div>
            <div class="import-preview-title">导入预览</div>
            <div id="importPreviewMeta" class="import-preview-meta"></div>
          </div>
          <div class="import-preview-actions">
            <button type="button" id="confirmImportBtn" class="btn-save">确认导入</button>
            <button type="button" id="cancelImportBtn" class="btn-ghost">取消</button>
          </div>
        </div>
        <div id="importPreviewSummary" class="import-preview-summary"></div>
      </div>
    </section>

    <!-- 保存 -->
    <div class="save-bar">
      <button type="button" id="saveBtn" class="btn-save">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        保存设置
      </button>
      <span id="saveStatus" class="save-status"></span>
    </div>
  </div>

  <script src="../db/indexeddb.js"></script>
  <script src="../shared/settings-backup.js"></script>
  <script src="options.js"></script>
</body>
</html>
